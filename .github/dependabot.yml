version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Jerusalem"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"

  - package-ecosystem: "pip"
    directory: "/python-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
      timezone: "Asia/Jerusalem"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "npm"
    directory: "/node-ai"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:20"
      timezone: "Asia/Jerusalem"
    labels:
      - "dependencies"
      - "node-ai"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Asia/Jerusalem"
    labels:
      - "dependencies"
      - "web"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:40"
      timezone: "Asia/Jerusalem"
    labels:
      - "dependencies"
      - "mobile"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "docker"
    directory: "/node-ai"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:50"
      timezone: "Asia/Jerusalem"
    labels:
      - "dependencies"
      - "docker"
      - "node-ai"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "docker"
    directory: "/python-server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Asia/Jerusalem"
    labels:
      - "dependencies"
      - "docker"
      - "python"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "docker"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:10"
      timezone: "Asia/Jerusalem"
    labels:
      - "dependencies"
      - "docker"
      - "web"
    commit-message:
      prefix: "deps"
