name: Deploy to Azure

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  RESOURCE_GROUP: ab-deliveries-rg
  ACR_NAME: abdeliveriesgalha2026
  REGISTRY: abdeliveriesgalha2026.azurecr.io
  PYTHON_APP_NAME: ab-python-server
  NODE_AI_APP_NAME: ab-node-ai
  WEB_APP_NAME: ab-web
  PYTHON_API_URL: https://ab-python-server.salmonmoss-0b293592.northeurope.azurecontainerapps.io
  NODE_AI_URL: https://ab-node-ai.salmonmoss-0b293592.northeurope.azurecontainerapps.io
  WEB_URL: https://ab-web.salmonmoss-0b293592.northeurope.azurecontainerapps.io

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Compute deployment metadata
        id: metadata
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMMIT_SHA="${GITHUB_SHA}"
            RUN_ID="${GITHUB_RUN_ID}"
          else
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
            RUN_ID="${{ github.event.workflow_run.id }}"
          fi

          SHORT_SHA="${COMMIT_SHA::7}"
          REVISION_SUFFIX="gha${RUN_ID}-${SHORT_SHA}"

          echo "COMMIT_SHA=${COMMIT_SHA}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "REVISION_SUFFIX=${REVISION_SUFFIX}" >> "$GITHUB_ENV"

      - name: Detect changed services
        id: changes
        shell: bash
        run: |
          PYTHON_CHANGED=false
          NODE_CHANGED=false
          WEB_CHANGED=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PYTHON_CHANGED=true
            NODE_CHANGED=true
            WEB_CHANGED=true
          else
            BASE_SHA="$(git rev-parse "${COMMIT_SHA}^" 2>/dev/null || true)"

            if [ -z "$BASE_SHA" ]; then
              PYTHON_CHANGED=true
              NODE_CHANGED=true
              WEB_CHANGED=true
            else
              git diff --name-only "$BASE_SHA" "$COMMIT_SHA" > changed-files.txt

              if grep -E '^(python-server/)' changed-files.txt >/dev/null; then
                PYTHON_CHANGED=true
              fi

              if grep -E '^(node-ai/)' changed-files.txt >/dev/null; then
                NODE_CHANGED=true
              fi

              if grep -E '^(web/)' changed-files.txt >/dev/null; then
                WEB_CHANGED=true
              fi
            fi
          fi

          echo "python_changed=$PYTHON_CHANGED" >> "$GITHUB_OUTPUT"
          echo "node_changed=$NODE_CHANGED" >> "$GITHUB_OUTPUT"
          echo "web_changed=$WEB_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Build and push node-ai image
        if: steps.changes.outputs.node_changed == 'true'
        run: |
          docker build \
            -t "$REGISTRY/ab-deliveries/node-ai:$SHORT_SHA" \
            ./node-ai
          docker push "$REGISTRY/ab-deliveries/node-ai:$SHORT_SHA"

      - name: Build and push python-server image
        if: steps.changes.outputs.python_changed == 'true'
        run: |
          docker build \
            -t "$REGISTRY/ab-deliveries/python-server:$SHORT_SHA" \
            ./python-server
          docker push "$REGISTRY/ab-deliveries/python-server:$SHORT_SHA"

      - name: Build and push web image
        if: steps.changes.outputs.web_changed == 'true'
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL="$PYTHON_API_URL" \
            -t "$REGISTRY/ab-deliveries/web:$SHORT_SHA" \
            ./web
          docker push "$REGISTRY/ab-deliveries/web:$SHORT_SHA"

      - name: Deploy node-ai Container App
        if: steps.changes.outputs.node_changed == 'true'
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$NODE_AI_APP_NAME" \
            --image "$REGISTRY/ab-deliveries/node-ai:$SHORT_SHA" \
            --revision-suffix "${REVISION_SUFFIX}-node"

      - name: Deploy python-server Container App
        if: steps.changes.outputs.python_changed == 'true'
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$PYTHON_APP_NAME" \
            --image "$REGISTRY/ab-deliveries/python-server:$SHORT_SHA" \
            --revision-suffix "${REVISION_SUFFIX}-py"

      - name: Deploy web Container App
        if: steps.changes.outputs.web_changed == 'true'
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$WEB_APP_NAME" \
            --image "$REGISTRY/ab-deliveries/web:$SHORT_SHA" \
            --revision-suffix "${REVISION_SUFFIX}-web"

      - name: Skip deployment when no deployable services changed
        if: steps.changes.outputs.python_changed != 'true' && steps.changes.outputs.node_changed != 'true' && steps.changes.outputs.web_changed != 'true'
        run: echo "No deployable service paths changed. Skipping image build and deployment."

      - name: Verify node-ai health
        if: steps.changes.outputs.node_changed == 'true'
        run: curl --fail --retry 10 --retry-delay 10 "$NODE_AI_URL/health"

      - name: Verify python-server health
        if: steps.changes.outputs.python_changed == 'true'
        run: curl --fail --retry 10 --retry-delay 10 "$PYTHON_API_URL/health"

      - name: Verify web root
        if: steps.changes.outputs.web_changed == 'true'
        run: curl --fail --retry 10 --retry-delay 10 "$WEB_URL"
